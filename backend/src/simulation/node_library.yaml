# Onyx Leopard — Universal Node Library
#
# Single source of truth for every node type the engine knows. Industry-agnostic.
# A BD rep is the same node whether the company is a restaurant or a SaaS firm —
# what changes is *whether* the CEO chooses to hire one, given the seed and stance.
#
# Schema (per node entry):
#   category: one of [location, supplier, ops, sales, marketing, finance, exec, external, revenue]
#   label: human-readable display name
#   hire_cost: float — one-time cash outlay to spawn (recruiting, onboarding, build-out)
#   daily_fixed_costs: float — ongoing daily wage / overhead burn
#   employees_count: int — headcount added to total_employees on spawn
#   capacity_contribution: int — adds to company physical capacity (0 unless a location)
#   modifier_keys: dict[str, float] — modifier name → magnitude registered when spawned
#   prerequisites: list[str] — node_keys that must already exist in the company
#   category_caps:
#     soft_cap: int — diminishing returns past this count
#     hard_cap: int — maximum possible spawns of this node
#   applicable_economics: list[str] — which economics models this node is appropriate for
#
# Numeric notes:
#   * daily_fixed_costs is derived from US labor-market annual salary / 365 where the
#     existing YAMLs declared annual_cost; rounded to 2 decimals.
#   * hire_cost for roles ~= 1-3 months salary (recruiting + ramp); for locations,
#     explicit build-out cost (lease, equipment, fitout). Externals/partnerships ~= 0
#     unless there's a real onboarding fee (legal, regulatory).
#   * Prerequisites enforce realistic org-build sequencing (e.g., CMO requires
#     marketing_manager; second location requires first).
#   * modifier_keys magnitudes mirror the values the existing YAMLs used for the
#     same-or-similar concept; kept conservative (most ≤ 0.20).

