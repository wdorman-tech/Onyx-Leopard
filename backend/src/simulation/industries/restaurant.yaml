# ── Triggers ──
# Evaluated in listed order. All 19 match the existing TRIGGER_REGISTRY.
triggers:
  - node_type: general_manager
    label: "Hired General Manager"
    condition:
      monthly_revenue: { ">": 15000 }

  - node_type: bookkeeper
    label: "Hired Bookkeeper"
    condition:
      any:
        - location_count: { ">": 1 }
        - monthly_revenue: { ">": 25000 }

  - node_type: restaurant
    label: "Opened new restaurant location"
    max_instances: 999
    cooldown_ticks: 90
    is_location_expansion: true
    condition:
      all:
        - cash: { ">": 80000 }
        - avg_location_margin: { ">=": 0.10 }
        - has_node: general_manager

  - node_type: marketing
    label: "Hired Marketing Manager"
    condition:
      location_count: { ">=": 3 }

  - node_type: delivery_partnership
    label: "Established Delivery Partnerships"
    condition:
      location_count: { ">=": 3 }

  - node_type: training
    label: "Established Training Program"
    condition:
      location_count: { ">=": 3 }

  - node_type: quality_assurance
    label: "Hired Quality Assurance Manager"
    condition:
      location_count: { ">=": 3 }

  - node_type: hr
    label: "Established HR Department"
    condition:
      any:
        - total_employees: { ">": 50 }
        - location_count: { ">=": 4 }

  - node_type: area_manager
    label: "Hired Area Manager"
    max_instances: 999
    cooldown_ticks: 30
    condition:
      all:
        - location_count: { ">=": 6 }
        - node_count_ratio:
            node_type: area_manager
            per: 6

  - node_type: procurement
    label: "Hired Procurement Manager"
    condition:
      location_count: { ">=": 5 }

  - node_type: it_support
    label: "Hired IT Support"
    condition:
      location_count: { ">=": 5 }

  - node_type: commissary
    label: "Built Commissary Kitchen"
    condition:
      location_count: { ">=": 5 }

  - node_type: catering
    label: "Launched Catering Division"
    condition:
      all:
        - location_count: { ">=": 5 }
        - avg_satisfaction: { ">": 0.7 }

  - node_type: real_estate
    label: "Established Real Estate Department"
    condition:
      locations_opened_this_year: { ">=": 3 }

  - node_type: construction
    label: "Established Construction & Facilities"
    condition:
      location_count: { ">=": 8 }

  - node_type: rnd_menu
    label: "Established R&D / Menu Development"
    condition:
      all:
        - location_count: { ">=": 10 }
        - monthly_revenue: { ">": 200000 }

  - node_type: legal
    label: "Established Legal Department"
    condition:
      location_count: { ">=": 10 }

  - node_type: finance_fpa
    label: "Established Finance & FP&A"
    condition:
      monthly_revenue: { ">": 500000 }

  - node_type: distribution_center
    label: "Built Distribution Center"
    condition:
      location_count: { ">=": 20 }

# ── Bridge mappings ──
bridge:
  marketing_baseline: 5.0
  marketing_per_location: 1.0
  sustainable_utilization: 0.85
  marketing_contributions:
    marketing: 15.0
    delivery_partnership: 10.0
    catering: 5.0
  quality_modifier_keys:
    - satisfaction_baseline
    - menu_innovation
    - new_location_satisfaction
    - ceo_quality_boost
  infrastructure_multipliers:
    commissary: 1.15
    distribution_center: 1.10

# ── Engine constants ──
constants:
  location_open_cost: 50000
  employees_per_location: 15
  starting_cash: 50000
  new_location_starting_customers: 20.0
  new_location_starting_satisfaction: 0.5
  volume_discounts:
    - [21, 0.72]
    - [11, 0.80]
    - [6, 0.87]
    - [3, 0.93]
    - [1, 1.00]

# ── Growth stages ──
stages:
  - { min_locations: 1, stage: 1 }
  - { min_locations: 2, stage: 2 }
  - { min_locations: 11, stage: 3 }
  - { min_locations: 51, stage: 4 }

# ── Location economics defaults ──
location_defaults:
  inventory: 80.0
  customers: 30.0
  satisfaction: 0.7
  price: 14.00
  max_capacity: 80
  food_cost_per_plate: 1.50
  daily_fixed_costs: 300.0
  reorder_point: 30.0
  reorder_qty: 100.0
  chicken_cost_per_lb: 3.50
  spoilage_rate: 0.05
  word_of_mouth_rate: 0.02
  max_local_customers: 120.0
  # Unified mode overrides
  unified_reorder_qty: 200.0
  unified_reorder_point: 80.0
